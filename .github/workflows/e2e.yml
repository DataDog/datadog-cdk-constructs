name: e2e

# End-to-end AWS Lambda instrumentation suite. Path-filtered so it only runs when
# the construct or the suite changes, and gated by SKIP_LAMBDA_TESTS so forks (which
# lack the OIDC/Datadog secrets) no-op cleanly. See e2e/README.md for the contract.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "e2e/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "src/**"
      - "e2e/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/e2e.yml"

# One run per ref; cancel superseded runs so we never have two suites racing for
# the same shared account budget.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lambda-e2e:
    # Skip on forks: OIDC + Datadog secrets only exist on the canonical repo.
    if: github.repository == 'DataDog/datadog-cdk-constructs'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION_E2E || 'us-east-1' }}
      DD_SITE: ${{ vars.DD_SITE_E2E || 'datadoghq.com' }}
      SKIP_LAMBDA_TESTS: ${{ vars.SKIP_LAMBDA_TESTS || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Enable Corepack before setup-node so its package-manager cache step detects
      # the yarn berry version from package.json instead of falling back to yarn 1.
      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node 24
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24

      - name: Cache Node modules
        id: cache-node-modules
        uses: actions/cache@0c907a75c2c80ebcb7f088228285e798b750cf8f # v4.2.1
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: yarn install --immutable

      # Dedicated GitHub-OIDC role in the serverless sandbox account, scoped to deploy
      # one-e2e-cdk-lambda-* via the CDK bootstrap roles. See serverless-ci/e2e/iam-infra.md.
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_E2E || 'arn:aws:iam::425362996713:role/gha-datadog-cdk-e2e' }}
          aws-region: ${{ env.AWS_REGION }}

      # The account is already CDK-bootstrapped; deploy reads the bootstrap version
      # from SSM, so no bootstrap step is needed.
      # No Datadog org keys -> nothing to instrument or query, so skip cleanly (green)
      # rather than fail. The suite runs for real once a maintainer adds the secrets.
      - name: Skip when Datadog secrets are absent
        env:
          DATADOG_API_KEY_E2E: ${{ secrets.DATADOG_API_KEY_E2E }}
        run: |
          if [ -z "$DATADOG_API_KEY_E2E" ]; then
            echo "SKIP_LAMBDA_TESTS=true" >> "$GITHUB_ENV"
            echo "::warning::DATADOG_API_KEY_E2E secret not configured; skipping the Lambda e2e suite."
          fi

      - name: Resolve account id
        if: env.SKIP_LAMBDA_TESTS != 'true'
        run: echo "CDK_DEFAULT_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"

      - name: Run Lambda e2e suite
        run: yarn test:e2e
        env:
          # Baked into the function at synth + used by the construct/extension.
          DD_API_KEY: ${{ secrets.DATADOG_API_KEY_E2E }}
          # Used by the telemetry checker to query spans/logs.
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY_E2E }}
          DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY_E2E }}
